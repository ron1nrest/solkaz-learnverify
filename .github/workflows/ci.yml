name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run build
      - run: npx tsx scripts/security-check.ts
      - run: npm run validate-challenges

      - name: CLI smoke (offline)
        run: |
          node dist/cli.js --version
          node dist/cli.js challenges
          node dist/cli.js list-tasks -c week1-fundamentals.yaml

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:integration

  network:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - name: doctor (Devnet RPC)
        run: node dist/cli.js doctor
        continue-on-error: true
